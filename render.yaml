services:
  - type: web
    name: agriai
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agriai-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: agriai-db
    plan: free
    region: oregon
